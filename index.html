<!DOCTYPE html>
<html>
<head>
    <title>DHP Creations</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</head>
<body>
    <h1>Enter your details</h1>
    <form method="POST">
        <input type="text" name="username" placeholder="Your Name" required>
        <input type="hidden" name="device_id" id="device_id">
        <textarea name="message" placeholder="Message"></textarea>
        <button type="submit">Submit</button>
    </form>

    <h2>All Entries</h2>
    <ul>
        {% for user, msg in entries %}
        <li><strong>{{ user }}:</strong> {{ msg }}</li>
        {% endfor %}
    </ul>

    <script>
        // Auto-generate unique device ID for each user
        if (!localStorage.getItem('device_id')) {
            localStorage.setItem('device_id', 'device_' + Math.random().toString(36).substr(2, 9));
        }
        document.getElementById('device_id').value = localStorage.getItem('device_id');
    </script>
</body>
</html>
