<!DOCTYPE html>
<html>
<head>
    <title>DHP Creations</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="hero">
    <h1>DHP Creations</h1>
    <p>Where Stories Come Alive</p>
</section>

<section class="form-section">
    <h2>Join Our Team</h2>

    <form id="form">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="number" name="age" placeholder="Age" required>
        <input type="text" name="location" placeholder="Location" required>

        <select name="role" required>
            <option value="">Select Role</option>
            <option>Actor</option>
            <option>Writer</option>
            <option>Editor</option>
            <option>Director</option>
        </select>

        <input type="text" name="skills" placeholder="Skills / Genre">

        <input type="email" name="email" placeholder="Email" required>
        <input type="text" name="phone" placeholder="Phone" required>
        <input type="text" name="portfolio" placeholder="Portfolio Link">

        <button type="submit">Submit</button>
    </form>
</section>

<section class="data-section">
    <h2>Applications</h2>
    <div id="data"></div>
</section>

<!-- SOCIAL LINKS -->
<section class="contact">
    <h2>Connect With Us</h2>

    <p>Instagram:
        <a href="https://instagram.com/dhp_creations" target="_blank">
            @dhp_creations
        </a>
    </p>

    <p>YouTube:
        <a href="https://youtube.com/@dhpcreations" target="_blank">
            @dhpcreations
        </a>
    </p>

    <p>Email:
        <a href="mailto:dhpcreations15@gmail.com">
            dhpcreations15@gmail.com
        </a>
    </p>
</section>

<script src="script.js"></script>
</body>
</html>
